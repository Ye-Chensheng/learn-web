<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择用户 - vibe-healing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .quick-select {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .quick-select p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .quick-btn {
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .quick-btn:hover {
            background: #667eea;
            color: white;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 选择用户</h1>
        <p class="subtitle">请输入用户 ID 查看健康数据</p>
        
        <form id="user-form">
            <div class="form-group">
                <label for="user-id">用户 ID</label>
                <input type="number" id="user-id" placeholder="例如：10000" min="1" value="10000" required>
            </div>
            <button type="submit" class="btn">进入系统</button>
        </form>
        
        <div class="quick-select">
            <p>或快速选择测试用户</p>
            <button class="quick-btn" onclick="selectUser(10000)">🧪 测试用户 (10000) - 30 天完整数据</button>
            <button class="quick-btn" onclick="selectUser(1)">👤 默认用户 (1) - 7 天数据</button>
        </div>
        
        <div class="info">
            <strong>📊 测试用户 10000 包含：</strong><br>
            • 30 天完整健康记录<br>
            • 每日喝水、饮食、睡眠、运动数据<br>
            • 健康指数趋势<br>
            • 用户画像标签
        </div>
    </div>
    
    <script>
        // 表单提交
        document.getElementById('user-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const userId = document.getElementById('user-id').value;
            if (userId) {
                localStorage.setItem('vibe_user_id', userId);
                window.location.href = '/';
            }
        });
        
        // 快速选择
        window.selectUser = function(userId) {
            localStorage.setItem('vibe_user_id', userId);
            window.location.href = '/';
        };
        
        // 检查是否已有用户 ID
        window.addEventListener('DOMContentLoaded', function() {
            const existingUserId = localStorage.getItem('vibe_user_id');
            if (existingUserId) {
                document.getElementById('user-id').value = existingUserId;
            }
        });
    </script>
</body>
</html>
